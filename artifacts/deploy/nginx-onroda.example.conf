# Beispiel: 4 Hosts, ein Node-Upstream auf 127.0.0.1:3000 (PORT=3000).
# Pfade an euren Server anpassen, dann: sudo nginx -t && sudo systemctl reload nginx
#
# Certbot: ssl_certificate / ssl_certificate_key pro server_name setzen.

upstream onroda_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

# --- Marketing: nur Static, kein Admin-Panel ---
server {
    listen 443 ssl http2;
    server_name onroda.de www.onroda.de;

    # root = Repo: artifacts/api-server/static
    root /root/imoove/artifacts/api-server/static;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- Admin: SPA unter /partners/ über Node (Express in app.ts) ---
server {
    listen 443 ssl http2;
    server_name admin.onroda.de;

    location / {
        proxy_pass http://onroda_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# --- API + optional Root-JSON ---
server {
    listen 443 ssl http2;
    server_name api.onroda.de;

    location /api/ {
        proxy_pass http://onroda_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /ws {
        proxy_pass http://onroda_node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://onroda_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# --- Partner-Panel: eigene Subdomain, gleicher Node-Upstream wie Admin/API.
# WICHTIG: Kein Redirect auf admin.onroda.de/partners/ — das wäre die Admin-SPA.
# /partners* am Panel-Host: am Edge auf / umleiten (Express macht dasselbe als Fallback).
server {
    listen 443 ssl http2;
    server_name panel.onroda.de;

    location ^~ /partners {
        return 302 /;
    }

    location / {
        proxy_pass http://onroda_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
