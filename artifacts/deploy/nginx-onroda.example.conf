# Beispiel: getrennte Hosts (Marketing, Admin, API, Panel), ein Node-Upstream 127.0.0.1:3000.
# Nach Anpassung der Pfade: sudo nginx -t && sudo systemctl reload nginx
#
# =============================================================================
# TLS / api.onroda.de — typischer Produktionsfehler
# =============================================================================
# Symptom (curl ohne -k, Browser blockt fetch zum API-Host):
#   curl: (60) SSL: no alternative certificate subject name matches target host name 'api.onroda.de'
# Ursache: Für SNI-Host `api.onroda.de` wird ein Zertifikat ausgeliefert, dessen SAN/CN
#   diesen Namen nicht enthält (z. B. falsches default_cert, oder `ssl_certificate` zeigt
#   nur auf admin.onroda.de / onroda.de).
# Fix auf dem Server:
#   1) Zertifikat mit api.onroda.de im SAN ausstellen, z. B.:
#        sudo certbot certonly --nginx -d api.onroda.de
#      oder ein kombiniertes Zertifikat mit allen Hosts (openssl x509 … | grep -A1 'Subject Alternative Name').
#   2) In der passenden `server { server_name api.onroda.de; … }` genau diese Pfade setzen
#      (siehe unten `ssl_certificate` für api).
#   3) Kein `listen 443 ssl default_server` auf einem Block mit falschem Zertifikat für alle Hosts.
# Schnelltest:
#   openssl s_client -connect api.onroda.de:443 -servername api.onroda.de </dev/null 2>/dev/null | openssl x509 -noout -subject -ext subjectAltName
# =============================================================================

upstream onroda_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Gemeinsame TLS-Parameter (optional; Pfade pro server {} bleiben getrennt)
# ssl_protocols TLSv1.2 TLSv1.3;

# --- Marketing ---
server {
    listen 443 ssl http2;
    server_name onroda.de www.onroda.de;

    # Certbot: ein Zertifikat pro Name oder SAN-Liste — Pfade anpassen
    ssl_certificate     /etc/letsencrypt/live/onroda.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onroda.de/privkey.pem;

    root /root/imoove/artifacts/api-server/static;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- Plattform-Admin (SPA /partners/) ---
server {
    listen 443 ssl http2;
    server_name admin.onroda.de;

    ssl_certificate     /etc/letsencrypt/live/admin.onroda.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.onroda.de/privkey.pem;

    location / {
        proxy_pass http://onroda_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# --- API (REST, CORS, Admin-Login fetch von admin.onroda.de → api.onroda.de) ---
# WICHTIG: ssl_certificate muss api.onroda.de in SAN enthalten (nicht nur admin/marketing).
server {
    listen 443 ssl http2;
    server_name api.onroda.de;

    ssl_certificate     /etc/letsencrypt/live/api.onroda.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.onroda.de/privkey.pem;

    location /api/ {
        proxy_pass http://onroda_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /ws {
        proxy_pass http://onroda_node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://onroda_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# --- Partner-Panel ---
server {
    listen 443 ssl http2;
    server_name panel.onroda.de;

    ssl_certificate     /etc/letsencrypt/live/panel.onroda.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.onroda.de/privkey.pem;

    location ^~ /partners {
        return 302 /;
    }

    location / {
        proxy_pass http://onroda_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# Hinweis: Wenn ihr ein EINZIGES Zertifikat mit allen SANs nutzt, dürfen alle `ssl_certificate`
# auf dieselbe fullchain.pem zeigen — dann mit `openssl x509 -noout -ext subjectAltName` prüfen,
# dass wirklich api.onroda.de enthalten ist.
