<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partner · Onroda</title>
    <link rel="stylesheet" href="/onroda-brand.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--onroda-space-8);
      }
      .box {
        max-width: 32rem;
        background: var(--onroda-bg-card);
        border: 1px solid var(--onroda-border);
        border-radius: var(--onroda-radius-card);
        padding: var(--onroda-padding-card);
      }
      h1 {
        color: var(--onroda-red);
        font-size: 1.5rem;
        margin: 0 0 var(--onroda-space-4);
      }
      p {
        color: var(--onroda-text-grey);
        line-height: 1.6;
        margin: 0 0 var(--onroda-space-6);
      }
      a {
        color: var(--onroda-red);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Partner-Portal</h1>
      <p>
        Hier entsteht das Login und die Verwaltung für Partner. Die vollständige Oberfläche
        folgt in einem eigenen Deployment unter dieser Route.
      </p>
      <p><a href="/">Zurück zur Startseite</a></p>
    </div>
  </body>
</html>
