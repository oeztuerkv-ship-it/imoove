<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONRODA – Digitale Mobilität für Stuttgart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --bg-white: #ffffff;
      --text-dark: #1a1528;
      --onroda-red: #d5001c;
      --hp-card-border: #ececec;
      --hp-icon-bg: #fde8ec;
      --font-serif: "Libre Baskerville", serif;
      --font-sans: "DM Sans", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background-color: var(--bg-white);
      color: var(--text-dark);
      line-height: 1.6;
    }

    /* --- Sticky Header --- */
    .hp-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--hp-card-border);
    }

    .hp-header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hp-logo {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-dark);
      text-decoration: none;
    }

    .hp-nav a {
      color: var(--text-dark);
      text-decoration: none;
      font-weight: 500;
      margin-left: 30px;
      font-size: 1rem;
    }

    .hp-btn-login {
      background: var(--onroda-red);
      color: #fff !important;
      padding: 10px 20px;
      border-radius: 8px;
    }

    /* --- Hero Section --- */
    .hp-hero {
      padding: 80px 40px;
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 60px;
      align-items: center;
    }

    .hp-hero-h1 {
      font-family: var(--font-serif);
      font-size: clamp(2.5rem, 5vw, 4rem);
      margin: 0 0 20px;
      line-height: 1.1;
    }

    .hp-hero-lead {
      font-size: 1.25rem;
      color: #555;
      margin-bottom: 40px;
      max-width: 500px;
    }

    .hp-btn-primary {
      background: var(--onroda-red);
      color: white;
      padding: 16px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
    }

    .hp-hero-media img {
      width: 100%;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    /* --- Sections --- */
    .hp-section { padding: 80px 40px; max-width: 1400px; margin: 0 auto; }
    
    .hp-grid-4 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .hp-card {
      padding: 30px;
      border: 1px solid var(--hp-card-border);
      border-radius: 20px;
    }

    @media (max-width: 900px) {
      .hp-hero { grid-template-columns: 1fr; padding: 40px 20px; }
      .hp-header-inner { padding: 0 20px; }
    }
  </style>
</head>
<body>

  <header class="hp-header">
    <div class="hp-header-inner">
      <a class="hp-logo" href="/"><span style="color:var(--onroda-red);">ON</span>RODA</a>
      <nav class="hp-nav">
        <a href="#manifest">Warum wir</a>
        <a href="#fahrer">Fahrer</a>
        <a href="#partner">Partner</a>
        <a href="#unternehmen">Gutscheine</a>
        <a class="hp-btn-login" href="https://panel.onroda.de/">Login</a>
      </nav>
    </div>
  </header>

  <section class="hp-hero">
    <div class="hp-hero-copy">
      <h1 class="hp-hero-h1">Die <span style="color:var(--onroda-red);">Zukunft</span> der Mobilität</h1>
      <p class="hp-hero-lead">ONRODA verbindet Fahrgäste, Fahrer und Unternehmen in einem intelligenten System – für eine moderne und strukturierte Mobilität.</p>
      <a class="hp-btn-primary" href="#jetzt-buchen">Jetzt buchen →</a>
    </div>
    <figure class="hp-hero-media">
      <img src="DEIN_BILD_DATEINAME.png" alt="ONRODA Mobilität">
    </figure>
  </section>

  <script>
    // Dein bestehendes Script...
  </script>
</body>
</html>
