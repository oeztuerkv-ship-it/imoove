<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impressum | ONRODA</title>
  <link rel="stylesheet" href="/onroda-brand.css" />
  <style>
    body {
      margin: 0;
      font-family: "DM Sans", system-ui, -apple-system, sans-serif;
      color: #0f172a;
      background: #f8fafc;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }
    h1 {
      margin: 0 0 14px;
      font-size: 1.7rem;
      line-height: 1.2;
    }
    h2 {
      margin: 20px 0 10px;
      font-size: 1.05rem;
    }
    p {
      margin: 0 0 10px;
      line-height: 1.6;
    }
    .hint {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #fecaca;
      background: #fef2f2;
      color: #991b1b;
      font-size: 0.95rem;
    }
    .links {
      margin-top: 16px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    a {
      color: #be123c;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <article class="card">
      <h1>Impressum</h1>

      <h2>Angaben gemaess Paragraf 5 TMG</h2>
      <p><strong>Name:</strong> Vedat Oeztuerk</p>
      <p><strong>Anschrift:</strong> [Adresse einfuegen]</p>
      <p><strong>Land:</strong> Deutschland</p>
      <p><strong>E-Mail:</strong> <a href="mailto:onroda@mail.de">onroda@mail.de</a></p>

      <p class="hint">
        ONRODA befindet sich aktuell im Aufbau und ist noch nicht kommerziell aktiv.
      </p>

      <div class="links">
        <a href="/">Zur Startseite</a>
        <a href="/datenschutz">Datenschutz</a>
      </div>
    </article>
  </main>
</body>
</html>
