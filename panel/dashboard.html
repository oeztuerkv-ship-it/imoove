<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Onroda Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #fff;
    }

    .header {
      padding: 20px;
      background: #020617;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      color: #e11d48;
      font-weight: bold;
    }

    .logout {
      cursor: pointer;
      color: #94a3b8;
    }

    .main {
      padding: 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #020617;
      padding: 20px;
      border-radius: 12px;
      width: 200px;
    }

    .card h3 {
      margin: 0;
      font-size: 14px;
      color: #94a3b8;
    }

    .card p {
      font-size: 26px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">ONRODA</div>
    <div class="logout" onclick="logout()">Logout</div>
  </div>

  <div class="main">
    <h1>Dashboard</h1>

    <div class="cards">
      <div class="card">
        <h3>Offene Fahrten</h3>
        <p>12</p>
      </div>

      <div class="card">
        <h3>Laufend</h3>
        <p>5</p>
      </div>

      <div class="card">
        <h3>Heute erledigt</h3>
        <p>34</p>
      </div>

      <div class="card">
        <h3>Unternehmer</h3>
        <p>8</p>
      </div>
    </div>
  </div>

  <script>
    function logout() {
      window.location.href = "/";
    }
  </script>

</body>
</html>
